<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sach cong viec can lam</title>
    <style>
      .section-them-cong-viec { border: 1px solid red; padding: 10px}
      .section-danh-sach-cong-viec { border: 1px solid blueviolet; padding: 10px; margin-top: 20px;}
    </style>
</head>
<body>
    <h1>Danh sach cong viec can lam</h1>
    <!-- Section -->
    <section class="section-them-cong-viec">
        <h2>Them cong viec</h2>
        <form id="form-todo">
            <label>Ten Cong Viec</label>
            <input type="text" id="todo-title-input"/>
            <br />
            <button type="submit" id="add-todo-button"> Them Cong Viec</button>
         </form >
         <div id="todo-msg"></div>
    </section>
    <section class="section-danh-sach-cong-viec">
        <h2>Danh sach cong viec</h2>
        <ul id="todo-list">
            <li>
                <input type="checkbox" id="chk1"/> Ten cong viec
                <button type="button" id="edit-button1">➖ Sua</button>
                <button type="button" id="delete-button1">❌ Xoa</button>
            </li>
        </ul>
    </section>
    <script>
        //Dang ki su kien submit
        const todoForm = document.getElementById('form-todo');
        todoForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            // Thu thap thong tin nguoi dung tren giao dien
            const titleFromUser = document.getElementById('todo-title-input').value;
        // Chuan bi du lieu goi di payload
        const payload = {
            title: titleFromUser,
            completed: false
        };
        // Goi request POST
        const response = await fetch('http://localhost:3000/todos', {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
            });
            // Xu ly response
            if(!response.ok) {
                document.getElementById('todo-msg').innerHTML = '<b> Khong luu duoc. </b>';
            }
            const savedTodo = response.json();
                document.getElementById('todo-msg').innerHTML = `Da them cong viec ${savedTodo.id} thanh cong`;
        });

        // Ham
        async function loadTodos() {
            var response = await fetch('http://localhost:3000/todos');
            if(!response.ok) {
                document.getElementById('todo-list').innerHTML = '<li> khong load duoc du lieu</li>';
            }
            var data = await response.json();
            //console.log(data);
            var html ='';
            data.forEach(job => {
                html += '<li>';
                html += `<input type="checkbox" id="chk${job.id}"/><span> ${job.title} </span>`;
                html += `<button type="button" id="edit-button${job.id}">➖ Sua</button>`;
                html += `<button type="button" id="delete-button${job.id}">❌ Xoa</button>`;
                html += '</li>';

            });
            document.getElementById('todo-list').innerHTML = html

         // Đăng ký sự kiện click cho từng nút
            data.forEach(job => {
                const deleteButton = document.getElementById(`delete-button${job.id}`);
                deleteButton.addEventListener('click', async () => {
                    // alert(`đã click nút ${job.id}`);
                    const confirmed = confirm("Bạn có chắc chắn muốn xóa không?");
                    if(!confirmed) {
                        return;
                    }

                    // Gởi request DELETE đến server
                    const response = await fetch(`http://localhost:3000/todos/${job.id}`, {
                        method: 'DELETE'
                    });
                    if(!response.ok) {
                        document.getElementById('todo-msg').innerHTML = '<b>Có lỗi xảy ra, không xóa được.</b>';
                        return;
                    }

                    document.getElementById('todo-msg').innerHTML = `<b>Đã xóa ${job.id} thành công!</b>`;
                });
            });
        }
            

        
        // Goi ham
        loadTodos();
    </script>
</body>
</html>
