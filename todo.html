<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sach cong viec can lam</title>
    
    <style>
      .section-them-cong-viec { border: 1px solid red; padding: 10px}
      .section-danh-sach-cong-viec { border: 1px solid blueviolet; padding: 10px; margin-top: 20px;}
    </style>
    <script type="module" src="Src/todoStore.js"> </script>
</head>
<body>
    <h1>Danh sach cong viec can lam</h1>
    <!-- Section -->
    <section class="section-them-cong-viec">
        <h2>Them cong viec</h2>
        <form id="form-todo">
            <label>Ten Cong Viec</label>
            <input type="text" id="todo-title-input"/>
            <br />
            <button type="submit" id="add-todo-button"> Them Cong Viec</button>
         </form >
         <div id="todo-msg"></div>
    </section>
    <section class="section-danh-sach-cong-viec">
        <h2>Danh sach cong viec</h2>
        <ul id="todo-list">
            <li>
                <input type="checkbox" id="chk1"/> Ten cong viec
                <button type="button" id="edit-button1">➖ Sua</button>
                <button type="button" id="delete-button1">❌ Xoa</button>
            </li>
        </ul>
    </section>
    <script type="module">
        const API_URL = 'http://localhost:3000/todos';

        // Goi Ham Business de lay html trinh dien
        const todoHtml = await loadTodos(API_URL);
        document.getElementById('todo-list').innerHTML = todoHtml;

        //Dang ki su kien submit
        const todoForm = document.getElementById('form-todo');
        todoForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            // Thu thap thong tin nguoi dung tren giao dien
            const titleFromUser = document.getElementById('todo-title-input').value;
            // Goi ham
            const savedTodo = await addTodo(API_URL, titleFromUser);
            document.getElementById('todo-msg').innerHTML = `Da them cong viec ${savedTodo.id} thanh cong`;
        });

        //Dang ky event click cho cac phan tu co1 class btn-delete
        const lstdeletebutton = document.querySelectorAll('.btn-delete');
        lstdeletebutton.forEach((btn) => {
            const id = btn.dataset.id;

            btn.addEventListener('click', async (event) =>{
                // Lay gia tri cua thuoc tinh
                // alert( da click id =" + id")
                 const ok = confirm("Bạn có chắc chắn muốn xóa không?");
                    if(!ok) {
                        return;
                    }
                // goi ham xoa ...
                 const deletedJob = await deleteTodo(API_URL, id);

                document.getElementById('todo-msg').innerHTML = `<b>Đã xóa ${deletedJob.id} thành công!</b>`;
            });

        });

        //Dang ky event click cho cac phan tu co1 class btn-edit
        const lsteditbutton = document.querySelectorAll('.btn-edit');
        lsteditbutton.forEach((btn) => {
            const id = btn.dataset.id;
            const title = btn.dataset.title;

            btn.addEventListener('click', async (event) =>{
                const newtitle = prompt("Nhập tên công việc mới", title)
                    
                // goi ham sua ...
                const updatejob = await updateTodo(API_URL, id, newtitle);

                 document.getElementById('todo-msg').innerHTML = `<b>Đã cập nhật ${updatejob.id} thành công!</b>`;
            });

        });

        //Dang ky event change cho cac checkbox co class todo-checkbox
        const lstcheckbox = document.querySelectorAll('.todo-checkbox');
        lstcheckbox.forEach((chk) => {
            const id = chk.dataset.id;
            chk.addEventListener("change", (event) => {
                var isCompleted = event.target.checked;
                // Goi ham cap nhat trang thai completed
                const updatejob = updateTodoStatus(API_URL, id, isCompleted);
                document.getElementById('todo-msg').innerHTML = `<b>Đã cập nhật ${updatejob.id} thành công!</b>`;
            });

        });
