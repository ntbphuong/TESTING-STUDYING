<body>
    <h1>SIGN IN</h1>
    <!-- Thẻ FORM -->
    <form id="form-login" method="post" action="xulydangnhap.php">
        <label>Email</label>
        <input type="email" id="email-input"/>
        <br />
        <label>Password</label>
        <input type="password" id="password-input"/>
        <br />
        <button type="submit" id="login-button" data-testid="login-submit"> Sign in</button>
     </form>
     <script>
        const loginForm = document.getElementById("form-login");
        loginForm.addEventListener("submit", function(event) {
            event.preventDefault(); // chặn form gởi dữ liệu đi
            //Thu thập thông tin trên các ô nhập liệu
            var email = document.getElementById("email-input").value
            var password = document.getElementById("password-input").value
            //Gọi hàm xử lý
            var thongbao = login(email, password);
            // Hiển thị kết quả
             alert(thongbao);
            
        });
     </script>
